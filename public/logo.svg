<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" /> <!-- orange-500 -->
      <stop offset="100%" stop-color="#f59e0b" /> <!-- amber-500 -->
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#logoGradient)" />
  
  <!-- Portrait icon - simple friendly face -->
  <g transform="translate(50, 50)">
    <!-- Head -->
    <circle cx="0" cy="-5" r="18" fill="white" />
    
    <!-- Hair - friendly gray/silver -->
    <ellipse cx="0" cy="-18" rx="16" ry="8" fill="#9ca3af" />
    
    <!-- Eyes -->
    <circle cx="-6" cy="-7" r="2.5" fill="#374151" />
    <circle cx="6" cy="-7" r="2.5" fill="#374151" />
    
    <!-- Smile -->
    <path d="M-7 2 Q0 8 7 2" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round" />
    
    <!-- Frame - camera/photo frame -->
    <rect x="-22" y="-28" width="44" height="50" rx="6" stroke="white" stroke-width="3" fill="none" />
  </g>
</svg>
